name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Build wasm
        run: cargo build --release --target wasm32-wasip1

      - name: Prepare release assets
        run: |
          cp target/wasm32-wasip1/release/zellij-ssh-split.wasm .
          sha256sum zellij-ssh-split.wasm > SHA256SUMS

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            zellij-ssh-split.wasm
            SHA256SUMS
